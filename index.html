<script>
window.onload = function() {

  let currentUser = null;

  let rooms = [
    { id: 1, number: "101", assignedTo: "Awf", status: "Pending Editing" },
    { id: 2, number: "203", assignedTo: "Awf", status: "Edited" }
  ];

  const loginBtn = document.getElementById("loginBtn");
  const addRoomBtn = document.getElementById("addRoomBtn");

  loginBtn.onclick = function() {
    const name = document.getElementById("name").value;

    if (!name) {
      alert("Enter your name");
      return;
    }

    currentUser = name;

    document.getElementById("loginPage").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    document.getElementById("welcome").innerText = "Welcome, " + name;

    renderRooms();
  };

  addRoomBtn.onclick = function() {
    const number = document.getElementById("roomNumber").value;

    if (!number) return;

    rooms.push({
      id: Date.now(),
      number: number,
      assignedTo: currentUser,
      status: "Pending Editing"
    });

    renderRooms();
  };

  function renderRooms() {
    const list = document.getElementById("roomList");
    list.innerHTML = "";

    const userRooms = rooms.filter(r => r.assignedTo === currentUser);

    userRooms.forEach(room => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `Room ${room.number} - ${room.status}`;
      list.appendChild(div);
    });
  }

};
</script>
