<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Room Photography Tracking System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Hotel Room Photography Tracking System</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Rooms</a></li>
                <li><a href="#">Admin Dashboard</a></li>
                <li><a href="#">Butler Dashboard</a></li>
                <li><a href="#">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="authentication">
            <h2>Login</h2>
            <form action="#" method="post">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                <button type="submit">Login</button>
            </form>
        </section>

        <section id="admin-dashboard" style="display:none;">
            <h2>Admin Dashboard</h2>
            <form id="add-room-form" action="#" method="post">
                <h3>Add Room</h3>
                <label for="room-number">Room Number:</label>
                <input type="text" id="room-number" name="room-number" required>
                <label for="room-type">Room Type:</label>
                <input type="text" id="room-type" name="room-type" required>
                <label for="room-photos">Upload Room Photos:</label>
                <input type="file" id="room-photos" name="room-photos" multiple required>
                <button type="submit">Add Room</button>
            </form>
        </section>

        <section id="butler-dashboard" style="display:none;">
            <h2>Butler Dashboard</h2>
            <h3>Assigned Rooms</h3>
            <ul id="assigned-rooms-list">
                <!-- List of assigned rooms will be populated here -->
            </ul>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Hotel Room Photography Tracking System. All rights reserved.</p>
    </footer>
</body>
</html>
